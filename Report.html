<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { padding: 20px; background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
    .card { margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  </style>
</head>
<body onload="loadReport()">

  <!-- 料號詳細趨勢 Modal -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">📦 料號客訴詳情：<span id="productModalTitle"></span></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row mb-3">
            <div class="col-4 text-center"><div class="card card-body border-primary py-2"><div class="fs-4 fw-bold text-primary" id="pmTotal">-</div><div class="small text-muted">總客訴數</div></div></div>
            <div class="col-4 text-center"><div class="card card-body border-danger py-2"><div class="fs-4 fw-bold text-danger" id="pmUnresolved">-</div><div class="small text-muted">未解決</div></div></div>
            <div class="col-4 text-center"><div class="card card-body border-success py-2"><div class="fs-4 fw-bold text-success" id="pmClosed">-</div><div class="small text-muted">已結案</div></div></div>
          </div>
          <div class="row">
            <div class="col-md-8 mb-3"><h6 class="fw-bold">近30天每日趨勢</h6><canvas id="productDateChart" height="120"></canvas></div>
            <div class="col-md-4 mb-3"><h6 class="fw-bold">客訴分類分佈</h6><canvas id="productCatChart" height="160"></canvas></div>
          </div>
          <h6 class="fw-bold mt-2">最近5筆記錄</h6>
          <div id="pmRecentList"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="d-flex align-items-center mb-4">
      <h3 class="text-primary fw-bold mb-0">📊 分析報表</h3>
      <div class="ms-3">
        <select id="brandFilter" class="form-select form-select-sm" onchange="loadReport()" style="width:120px;">
          <option value="ALL">全部品牌</option>
          <option value="TLV">TLV</option>
          <option value="VW">VW</option>
          <option value="QM">QM</option>
          <option value="MH">MH</option>
        </select>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-md-3 mb-3"><div class="card card-body border-primary text-center py-3"><div class="fs-3 fw-bold text-primary" id="statTotal">-</div><div class="text-muted small">總客訴數</div></div></div>
      <div class="col-md-3 mb-3"><div class="card card-body border-danger text-center py-3"><div class="fs-3 fw-bold text-danger" id="statUnresolved">-</div><div class="text-muted small">未解決</div></div></div>
      <div class="col-md-3 mb-3"><div class="card card-body border-success text-center py-3"><div class="fs-3 fw-bold text-success" id="statClosed">-</div><div class="text-muted small">已結案</div></div></div>
      <div class="col-md-3 mb-3"><div class="card card-body border-warning text-center py-3"><div class="fs-3 fw-bold text-warning" id="statToday">-</div><div class="text-muted small">今日新增</div></div></div>
    </div>

    <div class="row">
      <!-- 依品項分析 -->
      <div class="col-12 mb-3">
        <div class="card card-body shadow-sm">
          <h5>📦 依品項（料號）分析</h5>
          <div id="productSummary"><div class="spinner-border spinner-border-sm"></div> 載入中...</div>
        </div>
      </div>

      <!-- 近30天趨勢 -->
      <div class="col-12 mb-3">
        <div class="card card-body shadow-sm">
          <h5>📈 近30天每日客訴趨勢</h5>
          <canvas id="dateChart" height="80"></canvas>
        </div>
      </div>

      <!-- 當日統計 -->
      <div class="col-md-6 mb-3">
        <div class="card card-body border-primary shadow-sm">
          <h5>📅 當日客訴統計（依分類）</h5>
          <div id="daySummary"><div class="spinner-border spinner-border-sm"></div> 載入中...</div>
        </div>
      </div>

      <!-- 本月統計 -->
      <div class="col-md-6 mb-3">
        <div class="card card-body border-info shadow-sm">
          <h5>📅 本月累積統計（依分類）</h5>
          <div id="monthSummary"><div class="spinner-border spinner-border-sm"></div> 載入中...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
  var dateChartInstance = null;
  var productDateChartInst = null;
  var productCatChartInst = null;
  var allRecordsCache = [];

  function escText(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function loadReport() {
    var brand = document.getElementById('brandFilter').value;
    document.getElementById('productSummary').innerHTML='<div class="spinner-border spinner-border-sm"></div> 載入中...';
    document.getElementById('daySummary').innerHTML='<div class="spinner-border spinner-border-sm"></div> 載入中...';
    document.getElementById('monthSummary').innerHTML='<div class="spinner-border spinner-border-sm"></div> 載入中...';
    document.getElementById('statTotal').innerText='-';
    document.getElementById('statUnresolved').innerText='-';
    document.getElementById('statClosed').innerText='-';
    document.getElementById('statToday').innerText='-';

    // 同時抓 dashboard 資料和全部記錄
    google.script.run
      .withSuccessHandler(function(res) {
        // 數字卡片
        var total = res.products.reduce(function(s,p){return s+p.total;},0);
        var unresolved = res.unresolved;
        var today = res.day.reduce(function(s,d){return s+d.count;},0);
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statUnresolved').innerText = unresolved;
        document.getElementById('statClosed').innerText = total - unresolved;
        document.getElementById('statToday').innerText = today;

        // 當日
        document.getElementById('daySummary').innerHTML=res.day.length
          ?'<ul class="list-group list-group-flush">'+res.day.map(function(s){return'<li class="list-group-item d-flex justify-content-between align-items-center">'+escText(s.cat)+'<span class="badge bg-primary rounded-pill">'+s.count+'</span></li>';}).join('')+'</ul>'
          :'今日尚無資料';
        // 本月
        document.getElementById('monthSummary').innerHTML=res.month.length
          ?'<ul class="list-group list-group-flush">'+res.month.map(function(s){return'<li class="list-group-item d-flex justify-content-between align-items-center">'+escText(s.cat)+'<span class="badge bg-info text-dark rounded-pill">'+s.count+'</span></li>';}).join('')+'</ul>'
          :'本月尚無資料';

        // 品項分析
        if(res.products&&res.products.length){
          var maxT=res.products[0].total||1;
          var ph='<div class="table-responsive"><table class="table table-sm table-hover align-middle mb-0"><thead><tr><th>料號</th><th>總計</th><th>未解決</th><th style="width:40%">比例</th></tr></thead><tbody>';
          res.products.forEach(function(p){
            var pct=Math.round(p.total/maxT*100);
            ph+='<tr style="cursor:pointer" onclick="showProductDetail(\''+escText(p.product)+'\',\''+brand+'\')">'+
              '<td><b class="text-primary text-decoration-underline">'+escText(p.product)+'</b></td>'+
              '<td>'+p.total+'</td><td><span class="badge bg-danger">'+p.unresolved+'</span></td>'+
              '<td><div style="background:#e9ecef;border-radius:4px;"><div style="width:'+pct+'%;height:18px;background:#0d6efd;border-radius:4px;"></div></div></td></tr>';
          });
          document.getElementById('productSummary').innerHTML=ph+'</tbody></table></div><p class="text-muted small mt-1 mb-0">💡 點擊料號可查看詳細趨勢</p>';
        } else {
          document.getElementById('productSummary').innerHTML='尚無品項資料';
        }

        // 趨勢圖
        if(dateChartInstance){dateChartInstance.destroy();}
        dateChartInstance=new Chart(document.getElementById('dateChart').getContext('2d'),{
          type:'line',
          data:{labels:res.dates.map(function(d){return d.date.slice(5);}),datasets:[{label:'客訴件數',data:res.dates.map(function(d){return d.count;}),borderColor:'#0d6efd',backgroundColor:'rgba(13,110,253,0.08)',tension:0.3,fill:true,pointRadius:3}]},
          options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
        });
      })
      .withFailureHandler(function(err){
        document.getElementById('productSummary').innerHTML='<div class="alert alert-danger">載入失敗：'+escText(String(err))+'</div>';
      })
      .getDashboardData(brand);
  }

  function showProductDetail(product, brand) {
    document.getElementById('productModalTitle').innerText=product;
    document.getElementById('pmTotal').innerText='-';
    document.getElementById('pmUnresolved').innerText='-';
    document.getElementById('pmClosed').innerText='-';
    document.getElementById('pmRecentList').innerHTML='<div class="spinner-border spinner-border-sm"></div> 載入中...';
    new bootstrap.Modal(document.getElementById('productModal')).show();

    google.script.run
      .withSuccessHandler(function(data){
        var filtered=data.filter(function(r){return r['客訴產品']===product;});
        var total=filtered.length;
        var unresolved=filtered.filter(function(r){return r['處理狀態']!=='已結案';}).length;
        document.getElementById('pmTotal').innerText=total;
        document.getElementById('pmUnresolved').innerText=unresolved;
        document.getElementById('pmClosed').innerText=total-unresolved;

        var now=new Date(),dateMap={},dateLabels=[],dateCounts=[];
        for(var i=29;i>=0;i--){var d=new Date(now.getTime()-i*86400000);var ds=d.toISOString().slice(0,10);dateMap[ds]=0;dateLabels.push(ds.slice(5));}
        filtered.forEach(function(r){var d=r['客訴日期']?r['客訴日期'].slice(0,10):'';if(dateMap.hasOwnProperty(d))dateMap[d]++;});
        Object.keys(dateMap).sort().forEach(function(k){dateCounts.push(dateMap[k]);});

        if(productDateChartInst){productDateChartInst.destroy();}
        productDateChartInst=new Chart(document.getElementById('productDateChart').getContext('2d'),{type:'line',data:{labels:dateLabels,datasets:[{label:'件數',data:dateCounts,borderColor:'#0d6efd',backgroundColor:'rgba(13,110,253,0.08)',tension:0.3,fill:true,pointRadius:3}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

        var catMap={};
        filtered.forEach(function(r){var cat=r['客訴分類']||'未分類';catMap[cat]=(catMap[cat]||0)+1;});
        var catLabels=Object.keys(catMap),catData=catLabels.map(function(k){return catMap[k];});
        if(productCatChartInst){productCatChartInst.destroy();}
        productCatChartInst=new Chart(document.getElementById('productCatChart').getContext('2d'),{type:'doughnut',data:{labels:catLabels,datasets:[{data:catData,backgroundColor:['#0d6efd','#fd7e14','#198754','#dc3545','#6f42c1','#20c997'].slice(0,catLabels.length)}]},options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}}}});

        var rHtml=filtered.length?'':'<div class="text-muted small">尚無記錄</div>';
        filtered.slice(0,5).forEach(function(r){
          var sc=r['處理狀態']==='已結案'?'bg-success':'bg-warning text-dark';
          rHtml+='<div class="d-flex justify-content-between align-items-start border-bottom py-2 small"><div><b>'+escText(r['編碼'])+'</b> <span class="text-muted">'+escText(r['客訴日期'])+'</span><br>'+escText(r['客訴內容']?r['客訴內容'].slice(0,40)+(r['客訴內容'].length>40?'…':''):'')+'</div><span class="badge '+sc+' ms-2 flex-shrink-0">'+escText(r['處理狀態'])+'</span></div>';
        });
        document.getElementById('pmRecentList').innerHTML=rHtml;
      })
      .withFailureHandler(function(err){document.getElementById('pmRecentList').innerHTML='<div class="alert alert-danger">載入失敗：'+escText(String(err))+'</div>';})
      .getBrandRecords(brand);
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
