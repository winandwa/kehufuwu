  <script>
  var WH_PASSWORD = "93704671";
  var whUnlocked = false;
  var pendingProgressId = null, pendingProgressBtn = null;
  var pendingStatusId = null, pendingStatusAction = null;
  var _allProducts = [], _lineText = "", _filterUnresolved = false;
  var _currentCaseType = "";
  var _menuOptions = { categories:[], solutions:[], solutionFields:{}, platforms:[], buyPlatforms:[] };
  var _summaryRange = 7;
  var _allRecords = [];
  var _currentBrand = "<?= brand ?>";

  function escText(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  function init() {
    setTWDate();
    loadProductList();
    loadMenuOptions();
  }

  function setTWDate() {
    var now = new Date();
    var utc = now.getTime() + now.getTimezoneOffset()*60000;
    var tw = new Date(utc + 8*60*60000);
    var y=tw.getFullYear(), m=String(tw.getMonth()+1).padStart(2,'0'), d=String(tw.getDate()).padStart(2,'0');
    document.getElementById('dateInput').value = y+'-'+m+'-'+d;
  }

  // ===== 品牌篩選（ALL頁面）=====
  function onBrandFilterChange(brand) {
    _currentBrand = brand;
    // 重新載入料號
    google.script.run
      .withSuccessHandler(function(products) {
        _allProducts = products || [];
        var dl = document.getElementById('productDatalist');
        if (dl) { dl.innerHTML=''; _allProducts.forEach(function(p){var o=document.createElement('option');o.value=p;dl.appendChild(o);}); }
      })
      .withFailureHandler(function(){})
      .getProductList(brand);
    // 重新載入記錄（如果在歷史查詢）
    if (document.getElementById('recordList')) loadRecords();
    // 重新載入統計（如果在統計）
    if (document.getElementById('dailyStats')) loadSummary();
  }

  // ===== 料號 =====
  function loadProductList() {
    google.script.run
      .withSuccessHandler(function(products) {
        _allProducts = products || [];
        var dl = document.getElementById('productDatalist');
        if (!dl) return;
        dl.innerHTML='';
        _allProducts.forEach(function(p){var o=document.createElement('option');o.value=p;dl.appendChild(o);});
      })
      .withFailureHandler(function(){})
      .getProductList(_currentBrand);
  }

  // ===== 選單 =====
  function loadMenuOptions() {
    google.script.run
      .withSuccessHandler(function(opts) {
        _menuOptions = opts;
        fillSelect('platformSelect', opts.platforms, true);
        fillSelect('buyPlatformSelect', opts.buyPlatforms, true);
        fillSelect('categorySelect', opts.categories, false);
        fillSelect('solutionSelect', opts.solutions, false);
      })
      .withFailureHandler(function(){})
      .getMenuOptions();
  }

  function fillSelect(id, items, allowOther) {
    var sel = document.getElementById(id);
    if (!sel) return;
    sel.innerHTML = '<option value="">-- 請選擇 --</option>';
    (items||[]).forEach(function(item){var o=document.createElement('option');o.value=item;o.text=item;sel.appendChild(o);});
    if (allowOther){var o=document.createElement('option');o.value='__other__';o.text='其他（手動輸入）';sel.appendChild(o);}
  }

  function onSelectOther(sel, inputId) {
    var input = document.getElementById(inputId);
    if (!input) return;
    input.style.display = sel.value==='__other__'?'':'none';
    if (sel.value==='__other__') input.focus(); else input.value='';
  }

  // ===== 解決方向動態子欄位 =====
  function onSolutionChange(val) {
    var container = document.getElementById('solutionSubFields');
    container.innerHTML = '';
    if (!val || !_menuOptions.solutionFields) return;
    var fields = _menuOptions.solutionFields[val] || [];
    if (fields.length === 0) return;

    // 欄位名稱對應到 payload key 和 input id
    var fieldMap = {
      '收件人': 'sol_recipientName',

    var customerName = document.getElementById('customerName').value.trim();

      customerName: customerName, orderNo: document.getElementById('orderNo').value,
      platform: platform, buyPlatform: buyPlatform, caseType: caseType,
      productNo:'', batchNo:'', category:'', subType:'', solution:'',
      content:'', comment:'', deliveryInfo:'', videoLinks:'', fileData:[],

    } else if (caseType==='退換貨處理') {
      payload.productNo=document.getElementById('productNo_return').value.trim();

      var otherR=document.getElementById('returnReasonOther').value.trim();
      if(otherR) payload.subType+='：'+otherR;
      var chkR=document.getElementById('chkReturn').checked, chkE=document.getElementById('chkExchange').checked;
      var actions=[]; if(chkR) actions.push('退貨'); if(chkE) actions.push('換貨');
      payload.solution=actions.join('+');
      if(chkR||chkE){
        payload.recipientName=document.getElementById('recipientName').value;
        payload.recipientAddress=document.getElementById('recipientAddress').value;
        payload.recipientTime=document.getElementById('recipientTime').value;
      }
      if(chkE) payload.exchangeItem=document.getElementById('exchangeItem').value;
      payload.content=document.getElementById('returnComment').value;
      var pkgFiles=document.getElementById('packageFileInput').files;
      for(var i=0;i<pkgFiles.length;i++){var b64=await new Promise(function(res){var r=new FileReader();r.onload=function(ev){res(ev.target.result);};r.readAsDataURL(pkgFiles[i]);});payload.fileData.push({fileName:pkgFiles[i].name,base64String:b64});}

    } else if (caseType==='客訴處理') {

      payload.solution=document.getElementById('solutionSelect').value;
      payload.content=document.getElementById('content_complaint').value.trim();

      payload.comment=document.getElementById('comment_complaint').value;
      payload.quantity=document.getElementById('quantity').value;
      payload.needDispatch=document.getElementById('needDispatch').checked;
      if(payload.needDispatch){payload.batchNo=document.getElementById('batchNoInput').value.trim();if(!payload.batchNo){alert("請填入產品批號");return;}}
      // 解決方向子欄位
      var fieldMap={'收件人':'sol_recipientName','收件地址':'sol_recipientAddress','方便收件時間':'sol_recipientTime','換貨品項':'sol_exchangeItem','補寄品項':'sol_resendItem','數量':'sol_quantity','補償說明':'sol_compensationNote','備註':'sol_noteContent','折扣說明':'sol_discountNote'};
      var payloadMap={'sol_recipientName':'recipientName','sol_recipientAddress':'recipientAddress','sol_recipientTime':'recipientTime','sol_exchangeItem':'exchangeItem','sol_resendItem':'resendItem','sol_quantity':'quantity','sol_compensationNote':'compensationNote','sol_noteContent':'noteContent','sol_discountNote':'discountNote'};
      var fields=_menuOptions.solutionFields[payload.solution]||[];
      fields.forEach(function(fieldName){
        var inputId=fieldMap[fieldName]||('sol_'+fieldName);
        var el=document.getElementById(inputId);

      var videoLinks=[];document.querySelectorAll('.video-link').forEach(function(inp){var v=inp.value.trim();if(v)videoLinks.push(v);});

      for(var i=0;i<files.length;i++){var b64=await new Promise(function(res){var r=new FileReader();r.onload=function(ev){res(ev.target.result);};r.readAsDataURL(files[i]);});payload.fileData.push({fileName:files[i].name,base64String:b64});}

    } else if (caseType==='專線處理') {

      .withSuccessHandler(function(res){

          _lineText='【單號】'+(payload.orderNo||'')+'\n【購買的品項】'+(lineItem||payload.productNo||'')+'\n【數量】'+(payload.quantity||'')+'\n【處理方式】'+(payload.solution||'')+'\n【訂單/退貨/客訴主因】'+(payload.category||payload.subType||'')+'\n【事件發生說明】\n'+(payload.content||'')+'\n【行政/行銷處理方式】'+(payload.comment||'')+'\n【聯繫/收件資訊】'+(payload.recipientName?(payload.recipientName+' '+payload.recipientAddress):'');
          document.getElementById('copyTextBox').innerText=_lineText;

      .processForm(payload);

  function fmtDate(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}

  function renderDailyStats(){
    var now=new Date();
    var utc=now.getTime()+now.getTimezoneOffset()*60000;
    var tw=new Date(utc+8*60*60000);
    var days=[];
    if(_summaryRange==='month'){
      var y=tw.getFullYear(),m=tw.getMonth();
      var firstDay=new Date(y,m,1);
      var diff=Math.floor((tw-firstDay)/86400000);
      for(var i=diff;i>=0;i--){days.push(fmtDate(new Date(tw.getTime()-i*86400000)));}
    } else {
      for(var i=_summaryRange-1;i>=0;i--){days.push(fmtDate(new Date(tw.getTime()-i*86400000)));}
    }

    // 品牌篩選
    var brand=document.getElementById('brandFilter')?document.getElementById('brandFilter').value:'<?= brand ?>';
    var records=brand==='ALL'?_allRecords:_allRecords.filter(function(r){return r['品牌']===brand;});

    var byDate={};
    days.forEach(function(d){byDate[d]=[];});
    records.forEach(function(r){var d=(r['建立日期']||'').slice(0,10);if(byDate.hasOwnProperty(d))byDate[d].push(r);});

    var todayStr=fmtDate(tw);
    var html='';
    days.slice().reverse().forEach(function(dateStr){
      var recs=byDate[dateStr], total=recs.length, isToday=dateStr===todayStr;
      var label=isToday?dateStr+' <span class="badge bg-danger ms-1">今日</span>':dateStr;
      var byCat={};
      recs.forEach(function(r){var cat=r['客訴分類']||r['子類型/原因']||r['處理類型']||'未分類';if(!byCat[cat])byCat[cat]=[];byCat[cat].push(r);});

      html+='<details class="mb-2"'+(isToday?' open':'')+'>';
      html+='<summary class="d-flex align-items-center justify-content-between p-2 rounded" style="cursor:pointer;background:'+(total>0?'#e8f4fd':'#f8f9fa')+'">';
      html+='<span class="fw-bold">'+label+'</span><span class="badge '+(total>0?'bg-primary':'bg-secondary')+' rounded-pill">'+total+' 筆</span>';
      html+='</summary>';

      if(total>0){
        html+='<div class="ps-3 pt-2">';
        Object.keys(byCat).forEach(function(cat){
          var catRecs=byCat[cat];
          var byProduct={};
          catRecs.forEach(function(r){var p=r['客訴產品']||'（無料號）';if(!byProduct[p])byProduct[p]=[];byProduct[p].push(r);});
          html+='<details class="mb-1"><summary class="d-flex align-items-center gap-2 p-1" style="cursor:pointer">';
          html+='<span class="badge bg-light text-dark border">'+escText(cat)+'</span><span class="text-muted small">×'+catRecs.length+'</span></summary>';
          html+='<div class="ps-3 pt-1">';
          Object.keys(byProduct).forEach(function(product){
            var pRecs=byProduct[product];
            html+='<details class="mb-1"><summary class="d-flex align-items-center gap-2 p-1" style="cursor:pointer">';
            html+='<span class="text-primary small fw-bold">'+escText(product)+'</span><span class="text-muted small">×'+pRecs.length+'</span></summary>';
            html+='<div class="ps-3 pt-1">';
            pRecs.forEach(function(r){
              var isClosed=r['處理狀態']==='已結案';
              html+='<div class="d-flex align-items-start gap-2 py-1 border-bottom small">';
              html+='<span class="badge '+(isClosed?'bg-success':'bg-warning text-dark')+' flex-shrink-0">'+(isClosed?'✅':'⚠️')+'</span>';
              html+='<div><b>'+escText(r['編碼'])+'</b> - '+escText(r['客人名稱']);
              if(r['客訴內容'])html+='<br><span class="text-muted">'+escText(r['客訴內容'].slice(0,50)+(r['客訴內容'].length>50?'…':''))+'</span>';
              html+='</div></div>';
            });
            html+='</div></details>';
          });
          html+='</div></details>';
        });
        html+='</div>';
      }
      html+='</details>';
    });
    document.getElementById('dailyStats').innerHTML=html||'<div class="text-muted text-center py-3">此範圍內無資料</div>';
  }

  // ===== 歷史查詢 =====
  var _allRecordsQuery=[];
  function filterRecords(keyword){
    var hint=document.getElementById('searchHint');
    if(!keyword.trim()){hint.style.display='none';renderRecords(_allRecordsQuery);return;}
    var kw=keyword.trim().toLowerCase();
    var filtered=_allRecordsQuery.filter(function(item){
      return (item['訂單編號']||'').toLowerCase().indexOf(kw)>=0||
             (item['客訴產品']||'').toLowerCase().indexOf(kw)>=0||
             (item['客人名稱']||'').toLowerCase().indexOf(kw)>=0||
             (item['編碼']||'').toLowerCase().indexOf(kw)>=0;
    });
    hint.style.display='';
    hint.textContent='搜尋「'+keyword+'」共找到 '+filtered.length+' 筆';
    renderRecords(filtered);
  }

  function loadRecords(){
    var listDiv=document.getElementById('recordList');
    listDiv.innerHTML="讀取中...";
    google.script.run
      .withSuccessHandler(function(data){
        _allRecordsQuery=data||[];
        if(_filterUnresolved) _allRecordsQuery=_allRecordsQuery.filter(function(item){return item['處理狀態']!=='已結案';});
        var kw=document.getElementById('searchInput')?document.getElementById('searchInput').value.trim():'';
        if(kw){filterRecords(kw);return;}
        renderRecords(_allRecordsQuery);
      })
      .withFailureHandler(function(err){document.getElementById('recordList').innerHTML='<div class="alert alert-danger">讀取失敗：'+escText(String(err))+'</div>';})
      .getBrandRecords(_currentBrand);
  }

  function renderRecords(data){
    var listDiv=document.getElementById('recordList');
    if(!data||data.length===0){listDiv.innerHTML='<div class="alert alert-light text-center">目前尚無符合的記錄</div>';return;}
    var html='';
    data.forEach(function(item){
      var isClosed=item['處理狀態']==='已結案';
      var id=item['編碼']||'';
      var caseTypeBadge={'訂單處理':'<span class="badge bg-primary me-1">⭐️訂單</span>','退換貨處理':'<span class="badge bg-success me-1">🔄退換貨</span>','客訴處理':'<span class="badge bg-danger me-1">📢客訴</span>','專線處理':'<span class="badge bg-warning text-dark me-1">📞專線</span>','其他事項':'<span class="badge bg-secondary me-1">📝其他</span>'}[item['處理類型']]||'<span class="badge bg-secondary me-1">'+escText(item['處理類型']||'')+'</span>';
      var imgHtml='';
      (item['圖片網址清單']?item['圖片網址清單'].split(", "):[]).forEach(function(url){var m=url.match(/[-\w]{25,}/);if(m)imgHtml+='<a href="'+url+'" target="_blank"><img src="https://drive.google.com/thumbnail?id='+m[0]+'&sz=w200" class="img-thumb" onerror="this.src=\'https://placehold.co/80x80?text=No+Image\'"></a>';});
      var videoHtml='';
      if(item['影片連結']){item['影片連結'].split(', ').forEach(function(url){if(url.trim())videoHtml+='<a href="'+url.trim()+'" target="_blank" class="btn btn-sm btn-outline-secondary me-1 mb-1">🎥 影片</a>';});}
      var statusBadge=isClosed?'<span class="badge bg-success status-badge">✅ 已結案</span>':'<span class="badge bg-warning text-dark status-badge">⚠️ 未解決</span>';

      // 解決方向子欄位顯示
      var subFieldsHtml='';
      var subFieldNames=['收件人','收件地址','方便收件時間','換貨品項','補寄品項','數量','補償說明','備註','折扣說明'];
      var subFieldKeys=['收件人','收件地址','方便收件時間','換貨品項','補寄品項','數量','補償說明','備註','折扣說明'];
      var hasSubField=false;
      subFieldKeys.forEach(function(key){if(item[key])hasSubField=true;});
      if(hasSubField){
        subFieldsHtml='<div class="small bg-light p-2 rounded mt-1">';
        subFieldKeys.forEach(function(key){if(item[key])subFieldsHtml+='<b>'+escText(key)+'：</b>'+escText(item[key])+'　';});
        subFieldsHtml+='</div>';
      }

      var actionArea=isClosed
        ?'<div class="closed-banner mt-2">✅ 已結案</div><div class="mt-2"><button class="btn btn-sm btn-outline-warning" onclick="askStatusChange(\''+id+'\',\'reopen\')">🔄 重新開啟</button></div>'
        :'<div class="mt-3 p-2 bg-white border rounded"><div class="mb-2"><select class="form-select form-select-sm" id="role_'+id+'"><option value="brand">品牌客服</option><option value="wh">汶和 🔒</option></select></div><div class="input-group mb-2"><textarea class="form-control form-control-sm" id="up_'+id+'" placeholder="補充後續處理進度..."></textarea><button class="btn btn-sm btn-primary" onclick="addProgress(\''+id+'\',this)">更新</button></div><button class="btn btn-sm btn-success w-100" onclick="askStatusChange(\''+id+'\',\'close\')">✅ 結案</button></div>';

      var lineTextEncoded=encodeURIComponent(buildLineText(item));
      var copyBtn='<button class="btn btn-sm btn-outline-secondary mt-2 w-100" onclick="copyText(decodeURIComponent(\''+lineTextEncoded+'\'))">📋 複製 LINE 文字</button>';

      html+='<div class="card card-body shadow-sm'+(isClosed?' closed-card':'')+'"><details>'+
        '<summary class="h6 m-0">'+statusBadge+caseTypeBadge+' ['+escText(item['建立日期'])+'] <b>'+escText(id)+'</b> - '+escText(item['客人名稱'])+(item['客訴產品']?' <span class="text-muted fw-normal small">'+escText(item['客訴產品'])+'</span>':'')+
        '</summary><div class="mt-3 border-top pt-2">'+
        '<div class="row small"><div class="col-6"><b>單號：</b>'+escText(item['訂單編號'])+'</div><div class="col-6 text-end"><b>料號：</b>'+escText(item['客訴產品'])+(item['產品批號']?'<span class="badge bg-secondary ms-1">批號：'+escText(item['產品批號'])+'</span>':'')+'</div></div>'+
        '<p class="mt-1 mb-1 small"><b>平台：</b>'+escText(item['客訴平台'])+' / <b>購買：</b>'+escText(item['購買平台'])+'</p>'+
        (item['客訴分類']?'<p class="mb-1 small"><b>分類：</b>'+escText(item['客訴分類'])+(item['子類型/原因']?' / '+escText(item['子類型/原因']):'')+'</p>':'')+
        (item['解決方向']?'<p class="mb-1 small"><b>解決方向：</b>'+escText(item['解決方向'])+subFieldsHtml+'</p>':'')+
        '<p class="mb-1"><b>內容：</b>'+escText(item['客訴內容'])+'</p>'+
        (item['派工汶和']==='是'?'<span class="badge bg-warning text-dark mb-1">🔔 已派工汶和</span>':'')+
        '<div class="progress-box"><b>📝 後續進度：</b><br>'+escText(item['後續進度記錄']||'尚無進度')+'</div>'+
        '<div class="mt-2">'+imgHtml+videoHtml+'</div>'+
        copyBtn+actionArea+'</div></details></div>';
    });
    listDiv.innerHTML=html;
  }

  function addProgress(id,btn){
    var text=document.getElementById('up_'+id).value.trim();if(!text)return;
    var role=document.getElementById('role_'+id).value;
    if(role==='wh'&&!whUnlocked){pendingProgressId=id;pendingProgressBtn=btn;document.getElementById('whPassword').value='';document.getElementById('whError').style.display='none';new bootstrap.Modal(document.getElementById('whModal')).show();return;}
    submitProgress(id,role==='wh'?'[汶和] '+text:text,btn);
  }

  function confirmWhPassword(){
    if(document.getElementById('whPassword').value!==WH_PASSWORD){document.getElementById('whError').style.display='block';return;}
    whUnlocked=true;bootstrap.Modal.getInstance(document.getElementById('whModal')).hide();
    if(pendingProgressId){submitProgress(pendingProgressId,'[汶和] '+document.getElementById('up_'+pendingProgressId).value.trim(),pendingProgressBtn);pendingProgressId=null;pendingProgressBtn=null;}
  }

  function submitProgress(id,text,btn){
    btn.disabled=true;var orig=btn.innerText;btn.innerText='稍候..';
    google.script.run
      .withSuccessHandler(function(){alert("更新成功！");document.getElementById('up_'+id).value='';loadRecords();})
      .withFailureHandler(function(err){alert("更新失敗："+err);btn.disabled=false;btn.innerText=orig;})
      .updateComplaintProgress(id,text);
  }

  function askStatusChange(id,action){
    pendingStatusId=id;pendingStatusAction=action;
    var h=document.getElementById('statusModalHeader'),t=document.getElementById('statusModalTitle'),b=document.getElementById('statusModalBody'),c=document.getElementById('statusModalConfirm');
    if(action==='close'){h.className='modal-header bg-success text-white';t.innerText='✅ 確認結案';b.innerHTML='<p>結案後進度將鎖定。</p><p class="text-muted small">案件：'+escText(id)+'</p>';c.className='btn btn-success btn-sm';c.innerText='確認結案';}
    else{h.className='modal-header bg-warning';t.innerText='🔄 確認重新開啟';b.innerHTML='<p>重新開啟後可繼續更新進度。</p>';c.className='btn btn-warning btn-sm';c.innerText='確認重新開啟';}
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }

  function confirmStatusChange(){
    bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
    google.script.run
      .withSuccessHandler(function(res){res.status==='success'?loadRecords():alert("操作失敗："+res.message);})
      .withFailureHandler(function(err){alert("操作失敗："+err);})
      .setComplaintStatus(pendingStatusId,pendingStatusAction==='close'?'已結案':'未解決');
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
